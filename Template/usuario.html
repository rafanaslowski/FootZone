<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro - Usuário - FootZone</title>
  <link rel="stylesheet" href="../Static/style.css">
</head>
<body>

  <div class="background"></div>

  <div class="login-caixa">
    <div class="campos">
      <a href="usuario.html" class="campoAtivo">Usuário</a>
      <a href="empresa.html" class="campoDesativado">Empresa</a>
      <a href="admin.html" class="campoDesativado">Admin</a>
    </div>

    <h2>Cadastro de Usuário</h2>

    <form id="cadastro">
      <h4>Nome Completo:</h4>
      <input type="text" id="nome" placeholder="Nome Completo" oninput="MascaraNome(this)" required>
      <div class="erro" id="erro-nome"></div>

      <h4>CPF:</h4>
      <input type="text" id="cpf" placeholder="CPF" oninput="mascaraCPF(this)" required>
      <div class="erro" id="erro-cpf"></div>

      <h4>Email:</h4>
      <input type="email" id="email" placeholder="Email" oninput="mascaraEmail(this)" required>
      <div class="erro" id="erro-email"></div>

      <h4>Telefone:</h4>
      <input type="text" id="telefone" placeholder="Telefone" oninput="mascaraTelefone(this)" required>
      <div class="erro" id="erro-telefone"></div>

      <h4>Senha:</h4>
      <div class="campo-senha">
        <input type="password" id="senha" placeholder="Senha" required>
        <span class="toggle-senha" onclick="toggleSenha()">👁</span>
      </div>
      <div class="erro" id="erro-senha"></div>

      <h4>Confirmar Senha:</h4>
      <div class="campo-senha">
        <input type="password" id="confirmarSenha" placeholder="Confirmar Senha" required>
        <span class="toggle-senha" onclick="toggleConfirmarSenha()">👁</span>
      </div>
      <div class="erro" id="erro-confirmar-senha"></div>

      <button type="button" id="btnCadastrar">Cadastrar</button>
    </form>
  </div>

  <script src="../Static/script.js"></script>
</body>
</html>
