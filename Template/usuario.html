<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro - Usuário - FootZone</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

  <!-- FUNDO COM LOGO -->
  <div class="background"></div>

  <!-- CAIXA DE LOGIN -->
  <div class="login-caixa">

    <!-- ABAS -->
    <div class="campos">
        <a href="usuario.html" class="campoAtivo">Usuário</a>
        <a href="empresa.html" class="campoDesativado">Empresa</a>
        <a href="admin.html" class="campoDesativado">Admin</a>
    </div>

    <h2>Cadastro de Usuário</h2>

    <input type="text" placeholder="Nome Completo">
    <input type="text" placeholder="CPF">
    <input type="email" id="email" placeholder="Email" oninput="mascaraEmail(this)">
    <input type="text" placeholder="Telefone">
    <input type="password" placeholder="Senha">
    <input type="password" placeholder="Confirmar Senha">

    <button>Cadastrar</button>

  </div>
    
  <script src="../script.js"></script>
</body>
</html>
