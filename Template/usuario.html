<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro - Usuário - FootZone</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

  <!-- FUNDO COM LOGO -->
  <div class="background"></div>

  <!-- CAIXA DE LOGIN -->
  <div class="login-caixa">

    <!-- ABAS -->
    <div class="campos">
        <a href="usuario.html" class="campoAtivo">Usuário</a>
        <a href="empresa.html" class="campoDesativado">Empresa</a>
        <a href="admin.html" class="campoDesativado">Admin</a>
    </div>

    <h2>Cadastro de Usuário</h2>

    <h4>Nome Completo:</h4>
    <input type="text" id="nome" placeholder="Nome Completo" oninput="MascaraNome(this)">
    <h4>CPF:</h4>
    <input type="text" id="cpf" placeholder="CPF" oninput="mascaraCPF(this)">
    <h4>Email:</h4>
    <input type="email" id="email" placeholder="Email" oninput="mascaraEmail(this)">
    <h4>Telefone:</h4>
    <input type="text" id="telefone" placeholder="Telefone" oninput="mascaraTelefone(this)">
    <h4>Senha:</h4>
    <input type="password" id="senha" placeholder="Senha">
    <h4>Confirmar Senha:</h4>
    <input type="password" id="confirmar-senha" placeholder="Confirmar Senha">

    <button>Cadastrar</button>

  </div>
    
  <script src="../script.js"></script>
</body>
</html>
