<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <title>Catálogo - FootZone</title>
</head>
<body>

<header>
    <nav class="navbar">
        <a href="/" class="logo">
            <img class="logo" src="/Imagens/logo.png" alt="Logo">
        </a>
        <ul class="nav-links">
            <li><a href="/catalogo">Catálogo</a></li>
            <li><a href="/usuario">Sair</a></li>
        </ul>
    </nav>
</header>

<main style="margin-top: 100px;">
    <h2 style="text-align: center; color: #d4af37;">Nossos Produtos</h2>
    <div class="vitrine">
        {% for produto in produtos %}
        <div class="produto-card">
            <img src="{{ produto.url if produto.url else 'https://via.placeholder.com/200' }}" alt="{{ produto.nome }}">
            <div class="info">
                <h3>{{ produto.nome }}</h3>
                <p>{{ produto.marca }} | Tam: {{ produto.tamanho }}</p>
                <p class="preco">R$ {{ "{:.2f}".format(produto.preco) }}</p>
                <button class="btn-comprar">Adicionar ao Carrinho</button>
            </div>
        </div>
        {% else %}
        <p style="color: white; text-align: center; grid-column: 1/-1;">Nenhum produto disponível no momento.</p>
        {% endfor %}
    </div>
</main>
</body>
</html>
