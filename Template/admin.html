<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Admin - FootZone</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body>
    <div class="background"></div>
    <div class="login-caixa">
        <div class="campos">
            <a href="/usuario" class="campoDesativado">Usuário</a>
            <a href="/empresa" class="campoDesativado">Empresa</a>
            <a href="/admin" class="campoAtivo">Admin</a>
        </div>

        <h2>Acesso Administrativo</h2>

        <form action="/login/admin" method="post">
            <h4>Email Admin:</h4>
            <input type="email" name="email" required>

            <h4>Chave de Acesso:</h4>
            <input type="password" name="chave" id="chave" oninput="mascaraChavedeAcesso(this)" required>

            <button type="submit">Entrar no Painel</button>
        </form>
    </div>
    <script src="{{ url_for('static', path='/script.js') }}"></script>
</body>
</html>
