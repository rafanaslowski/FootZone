<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro - Admin - FOOTZONE</title>
  <link rel="stylesheet" href="../Static/style.css">
</head>
<body>

  <!-- FUNDO COM LOGO -->
  <div class="background"></div>

  <!-- CAIXA DE LOGIN -->
  <div class="login-caixa">

    <!-- ABAS -->
    <div class="campos">
        <a href="usuario.html" class="campoDesativado">Usuário</a>
        <a href="empresa.html" class="campoDesativado">Empresa</a>
        <a href="admin.html" class="campoAtivo">Admin</a>
    </div>

    <h2>Cadastro de Admin</h2>
    
    <h4>Nome Completo:</h4>
    <input type="text" id="nome" placeholder="Nome Completo" oninput="MascaraNome(this)">
    <h4>Email:</h4>
    <input type="email" id="email" placeholder="Email" oninput="mascaraEmail(this)">
    <h4>Chave de Acesso:</h4>
    <input type="text" id="chave-acesso" placeholder="chave de acesso" oninput="mascaraChavedeAcesso(this)">

    <button>Cadastrar</button>

  </div>

  <script src="../Static/script.js"></script>
</body>
</html>
