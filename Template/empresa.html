<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>cadastro - Empresa - FOOTZONE</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

  <!-- FUNDO COM LOGO -->
  <div class="background"></div>

  <!-- CAIXA DE LOGIN -->
  <div class="login-caixa">

    <!-- ABAS -->
    <div class="campos">
        <a href="usuario.html" class="campoDesativado">Usuário</a>
        <a href="empresa.html" class="campoAtivo">Empresa</a>
        <a href="admin.html" class="campoDesativado">Admin</a>
    </div>

    <h2>Cadastro de Empresa</h2>
    <h4>Nome da Empresa:</h4>
    <input type="text" id="nome-empresa" placeholder="Nome da Empresa" oninput="MascaraNome(this)">
    <h4>CNPJ:</h4>
    <input type="text" id="cnpj" placeholder="CNPJ" oninput="mascaraCNPJ(this)">
    <h4>Telefone:</h4>
    <input type="text" id="telefone" placeholder="Telefone" oninput="mascaraTelefone(this)">
    <h4>Email:</h4>
    <input type="email" id="email" placeholder="Email" oninput="mascaraEmail(this)">
    <h4>Senha:</h4>
    <input type="password" id="senha" placeholder="Senha" oninput="senhaForte(this)">
    <h4>Confirmar Senha:</h4>
    <input type="password" id="confirmar-senha" placeholder="Confirmar Senha">

    <button>Cadastrar</button>

  </div>
  <script src="../script.js"></script>
</body>
</html>
