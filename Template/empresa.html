<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro - Empresa - FootZone</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div class="background"></div>
  <div class="login-caixa">
    <div class="campos">
      <a href="/usuario" class="campoDesativado">Usuário</a>
      <a href="/empresa" class="campoAtivo">Empresa</a>
      <a href="/admin" class="campoDesativado">Admin</a>
    </div>

    <h2>Cadastro de Empresa</h2>

    <form action="/cadastrar/empresa" method="post">
      <h4>Nome da Empresa:</h4>
      <input type="text" name="nome_empresa" oninput="MascaraNome(this)" required>
      <h4>CNPJ:</h4>
      <input type="text" name="cnpj" placeholder="00.000.000/0000-00" required>
      <h4>Telefone:</h4>
      <input type="text" name="telefone" oninput="mascaraTelefone(this)" required>
      <h4>Endereço:</h4>
      <input type="text" name="endereco" required>
      
      <button type="submit">Cadastrar Empresa</button>
    </form>
  </div>
  <script src="{{ url_for('static', path='/script.js') }}"></script>
</body>
</html>
